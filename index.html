<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
header{
    background:#7c9a6d;
    color:white;
    padding:15px;
    text-align:center;
}

/* TOP STATS */
.statsBar{
    background:#ffffffcc;
    padding:10px;
    text-align:center;
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 240px);
}

/* CALENDAR */
.calendar{
    flex:2;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

/* DAY TILE */
.day{
    background: rgba(255,255,255,0.55);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    min-height:70px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* COIN TEXT */
.coin{
    font-size:12px;
    opacity:0.85;
}

/* SIDEBAR */
.sidebar{
    flex:1;
    background:#fffdf7cc;
    padding:15px;
    overflow:auto;
}

.sidebar.hidden{
    display:none;
}

/* TASK */
.task{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    padding:8px;
    border-bottom:1px solid #eee;
}

/* REWARD ITEM */
.reward{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:6px 0;
    padding:6px;
    border:1px solid #ddd;
    border-radius:6px;
    background:white;
}

/* BUTTONS */
button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.claim-btn{
    background:#ffb347;
}
.claim-btn:disabled{
    background:#ccc;
    cursor:not-allowed;
}

/* INPUT */
input{
    width:100%;
    margin:5px 0;
    padding:6px;
}
</style>
</head>

<body>

<header>
<h2>🗓 The BanannaSmuthi Calendar</h2>
</header>

<!-- 🔥 TOP STATS -->
<div class="statsBar">
    👤 User: <span id="userDisplay">Guest</span>
    🔥 Streak: <span id="streak">0</span>
    🪙 Available: <span id="available">0</span>
    📅 Weekly: <span id="weekly">0</span>
</div>

<div class="container">

<!-- CALENDAR -->
<div class="calendar">
    <div class="grid" id="calendar"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<h3 id="selectedDay"></h3>

<!-- 👤 USER -->
<h4>👤 Name</h4>
<input id="userInput" placeholder="Enter name">
<button onclick="setUser()">Set Name</button>

<hr>

<!-- TASKS -->
<input id="taskInput" placeholder="New task">
<input id="coinInput" type="number" placeholder="Coins">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

<hr>

<!-- REWARDS -->
<h3>🎁 Rewards</h3>

<input id="rewardName" placeholder="Reward name">
<input id="rewardCost" type="number" placeholder="Cost">
<button onclick="addReward()">Add Reward</button>

<div id="rewardList"></div>

<hr>

<h4>🪙 Available to Use: <span id="usable">0</span></h4>

</div>
</div>

<script>

let selectedDay = null;

let data = JSON.parse(localStorage.getItem("cozyData")) || {
    tasks:{},
    rewards:[],
    available:0,
    weekly:0,
    user:"Guest",
    selectedRewards:[]
};

function save(){
    localStorage.setItem("cozyData", JSON.stringify(data));
}

/* 👤 USER */
function setUser(){
    let name = document.getElementById("userInput").value;
    if(!name) return;
    data.user = name;
    save();
    updateUI();
}

/* OPEN DAY */
function openDay(key){
    selectedDay = key;
    document.getElementById("sidebar").classList.remove("hidden");
    document.getElementById("selectedDay").innerText = key;
    renderTasks();
}

/* CLOSE */
function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
}

/* TASKS */
function addTask(){
    if(!selectedDay) return;

    let name = document.getElementById("taskInput").value;
    let coins = parseInt(document.getElementById("coinInput").value)||0;

    if(!data.tasks[selectedDay]){
        data.tasks[selectedDay]={items:[]};
    }

    data.tasks[selectedDay].items.push({
        name,
        coins,
        done:false
    });

    save();
    renderTasks();
    buildCalendar();
    updateUI();
}

/* TOGGLE TASK */
function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];

    t.done = !t.done;

    if(t.done){
        data.available += t.coins;
        data.weekly += t.coins;
    } else {
        data.available -= t.coins;
        data.weekly -= t.coins;
    }

    save();
    renderTasks();
    buildCalendar();
    updateUI();
}

/* REWARDS */
function addReward(){
    let name = document.getElementById("rewardName").value;
    let cost = parseInt(document.getElementById("rewardCost").value)||0;

    data.rewards.push({name,cost,claimed:false});
    save();
    renderRewards();
    updateUI();
}

/* SELECT REWARD (PREVIEW COST) */
function toggleRewardSelect(i){
    let idx = data.selectedRewards.indexOf(i);

    if(idx === -1){
        data.selectedRewards.push(i);
    } else {
        data.selectedRewards.splice(idx,1);
    }

    updateUI();
}

/* CLAIM */
function claimReward(i){
    let r = data.rewards[i];

    if(data.available < r.cost){
        alert("Not enough points!");
        return;
    }

    data.available -= r.cost;
    r.claimed = true;

    save();
    renderRewards();
    updateUI();
}

/* CALENDAR */
function buildCalendar(){
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let d=1; d<=30; d++){
        let key = "day-"+d;

        let coins = 0;
        if(data.tasks[key]){
            coins = data.tasks[key].items
                .filter(t=>t.done)
                .reduce((a,b)=>a+b.coins,0);
        }

        cal.innerHTML += `
        <div class="day" onclick="openDay('${key}')">
            Day ${d}
            <div class="coin">🪙 ${coins}</div>
        </div>`;
    }
}

/* STREAK */
function getStreak(){
    let streak = 0;
    for(let i=1;i<=30;i++){
        let k = "day-"+i;
        if(data.tasks[k]?.items?.some(t=>t.done)){
            streak++;
        } else break;
    }
    return streak;
}

/* REWARDS RENDER */
function renderRewards(){
    let list = document.getElementById("rewardList");
    list.innerHTML = "";

    data.rewards.forEach((r,i)=>{
        let selected = data.selectedRewards.includes(i);

        list.innerHTML += `
        <div class="reward">
            <div>
                <input type="checkbox"
                    onchange="toggleRewardSelect(${i})"
                    ${selected ? "checked":""}>
                ${r.name} - 🪙${r.cost}
            </div>

            <button class="claim-btn"
                onclick="claimReward(${i})"
                ${r.claimed ? "disabled":""}>
                ${r.claimed ? "Claimed":"Claim"}
            </button>
        </div>`;
    });
}

/* TASKS */
function renderTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let day = data.tasks[selectedDay];
    if(!day) return;

    day.items.forEach((t,i)=>{
        list.innerHTML += `
        <div class="task">
            <span>${t.name} (+${t.coins})</span>
            <input type="checkbox" ${t.done?"checked":""}
                onchange="toggleTask(${i})">
        </div>`;
    });
}

/* UI */
function updateUI(){
    document.getElementById("available").innerText = data.available;
    document.getElementById("weekly").innerText = data.weekly;
    document.getElementById("userDisplay").innerText = data.user;
    document.getElementById("streak").innerText = getStreak();

    let reserved = 0;
    data.selectedRewards.forEach(i=>{
        if(data.rewards[i] && !data.rewards[i].claimed){
            reserved += data.rewards[i].cost;
        }
    });

    document.getElementById("usable").innerText =
        data.available - reserved;
}

/* INIT */
buildCalendar();
updateUI();

</script>

</body>
</html>
