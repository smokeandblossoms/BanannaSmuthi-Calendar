<script>
function redeemReward(id){
    if(!selectedDay) return;

    recalculateBalances();

    const index = data.rewards.findIndex(r => r.id === id);
    if(index === -1) return;

    const reward = data.rewards[index];

    if(data.availableCoins < Number(reward.cost || 0)){
        alert("Not enough available points for this reward yet.");
        return;
    }

    data.redeemedRewards.push({
        id: reward.id,
        name: reward.name,
        cost: reward.cost,
        redeemedOn: selectedDay
    });

    data.rewards.splice(index, 1);

    save();
    recalculateBalances();
    renderRewards();
    updateCoins();
    buildCalendar();
}

function renderRewards(){
    const list = document.getElementById("rewardList");
    list.innerHTML = "";

    recalculateBalances();

    const redeemedForThisDay = data.redeemedRewards.filter(r => r.redeemedOn === selectedDay);

    redeemedForThisDay.forEach(r => {
        list.innerHTML += `
        <div class="reward given">
            <div class="reward-left">
                🎁 Reward given on this day: ${escapeHTML(r.name)}
                <span class="reward-cost"> — ${Number(r.cost || 0)} points</span>
            </div>
        </div>`;
    });

    if(data.rewards.length === 0){
        if(redeemedForThisDay.length === 0){
            list.innerHTML = `<p class="empty">No rewards yet. Add one above.</p>`;
        }
        return;
    }

    data.rewards.forEach(r => {
        const canAfford = data.availableCoins >= Number(r.cost || 0);

        list.innerHTML += `
        <div class="reward">
            <div class="reward-left">
                <span>${escapeHTML(r.name)}</span>
                <span class="reward-cost"> — ${Number(r.cost || 0)} points</span>
            </div>
            <button onclick="redeemReward('${r.id}')" ${canAfford ? "" : "disabled"}>Redeem</button>
            <button class="danger" onclick="deleteReward('${r.id}')">Delete</button>
        </div>`;
    });
}
</script>
