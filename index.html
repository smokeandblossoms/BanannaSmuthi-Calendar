<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color:#2f2f2f;
}

header{
    background:#7c9a6d;
    color:white;
    padding:15px;
    text-align:center;
}

#monthLabel{
    font-size:32px;
    color:white;
    text-align:center;
    font-weight:bold;
    margin:10px 0;
    text-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.name-box{
    text-align:center;
    background:#fffdf7cc;
    padding:10px;
    margin:12px auto;
    width:min(650px, 90%);
    border-radius:12px;
}

.name-box input{
    max-width:260px;
}

.container{
    display:flex;
    min-height:calc(100vh - 230px);
    justify-content:center;
}

.calendar{
    flex:2;
    padding:20px;
    max-width:900px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.weekday{
    color:white;
    text-align:center;
    font-weight:bold;
    text-shadow:0 2px 5px rgba(0,0,0,0.4);
}

.day{
    background: rgba(255,255,255,0.5);
    border-radius:10px;
    padding:10px;
    min-height:72px;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    font-size:14px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(8px);
}

.day:hover{
    background: rgba(255,255,255,0.68);
}

.day.today{
    outline:3px solid #7c9a6d;
}

.day-number{
    font-weight:bold;
    font-size:17px;
}

.day small{
    display:block;
    margin-top:7px;
}

@keyframes coinGlowBurst {
    0% {
        transform: scale(1);
        text-shadow: 0 0 0 rgba(255,215,0,0);
    }
    40% {
        transform: scale(1.4);
        text-shadow:
            0 0 6px gold,
            0 0 12px white,
            0 0 18px gold;
    }
    100% {
        transform: scale(1);
        text-shadow: 0 0 0 rgba(255,215,0,0);
    }
}

.coin-glitter {
    display: inline-block;
}

.coin-glitter.animate {
    animation: coinGlowBurst 600ms ease-out;
}

.sidebar{
    flex:1;
    max-width:420px;
    background:#fffdf7e8;
    border-left:2px solid #e6dfd2;
    padding:15px;
    overflow:auto;
}

.sidebar.hidden{
    display:none;
}

.task, .reward{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin:8px 0;
    padding:8px;
    border-bottom:1px solid #eee;
    align-items:center;
}

.task.done .task-name{
    text-decoration:line-through;
    color:green;
}

.task-left, .reward-left{
    flex:1;
}

button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:#6e8d5f;
}

button.danger{
    background:#b76e6e;
}

button:disabled{
    background:#aaa;
    cursor:not-allowed;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:7px;
    margin:5px 0;
    border:1px solid #d8d0c3;
    border-radius:6px;
}

.coins{
    background:#fff3c4cc;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    line-height:1.6;
}

.section{
    background:rgba(255,255,255,0.45);
    padding:10px;
    border-radius:10px;
    margin-top:12px;
}

.section h3{
    margin-top:0;
}

.empty{
    color:#777;
    font-style:italic;
}

.reward-cost{
    font-weight:bold;
}

.redeemed{
    font-size:13px;
    color:#777;
}

@media(max-width:850px){
    .container{
        flex-direction:column;
    }

    .sidebar{
        max-width:none;
        border-left:none;
        border-top:2px solid #e6dfd2;
    }

    .grid{
        gap:5px;
    }

    .day{
        min-height:58px;
        padding:7px;
    }
}
</style>
</head>

<body>

<header>
<h2 id="titleName">The BanannaSmuthi Calendar</h2>
</header>

<div class="name-box">
    <strong>Your name:</strong>
    <input id="nameInput" placeholder="Choose a name...">
    <button onclick="saveName()">Save Name</button>
</div>

<h3 id="monthLabel"></h3>

<div class="container">

<div class="calendar">
    <div class="grid" id="calendar"></div>
</div>

<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<div class="coins">
    🫧 <strong id="helloName">Oiii!</strong><br>
    🪙 Available Points to Use: <span id="availableCoins">0</span><br>
    🪙 Daily Coins: <span id="dailyCoins">0</span><br>
    🪙 Weekly Coins: <span id="weeklyCoins">0</span><br>
    🪙 Lifetime Coins: <span id="lifeCoins">0</span><br>
    🔥 Daily Streak: <span id="streak">0</span>
</div>

<h3 id="selectedDay"></h3>

<div class="section">
    <h3>Tasks</h3>
    <input id="taskInput" placeholder="New task...">
    <input id="coinInput" type="number" min="0" placeholder="Coin value">
    <button onclick="addTask()">Add Task</button>
    <div id="taskList"></div>
</div>

<div class="section">
    <h3>Rewards</h3>
    <p class="redeemed">Rewards are global. Once redeemed, the reward disappears and its cost is subtracted from available points.</p>
    <input id="rewardInput" placeholder="New reward...">
    <input id="rewardCostInput" type="number" min="0" placeholder="Reward cost">
    <button onclick="addReward()">Add Reward</button>
    <div id="rewardList"></div>
</div>

</div>
</div>

<script>
let today = new Date();
let selectedDay = null;

function dateKey(date){
    return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

function parseKey(key){
    const parts = key.split("-").map(Number);
    return new Date(parts[0], parts[1], parts[2]);
}

function cleanDate(date){
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

let data = JSON.parse(localStorage.getItem("cozyDataV2")) || {
    userName:"",
    tasks:{},
    rewards:[],
    availableCoins:0,
    lifetime:0,
    spentCoins:0,
    redeemedRewards:[],
    lastStreakChecked:null
};

function migrateOldData(){
    if(data.coins !== undefined && data.availableCoins === undefined){
        data.availableCoins = data.coins;
    }
    if(!data.rewards) data.rewards = [];
    if(!data.redeemedRewards) data.redeemedRewards = [];
    if(data.spentCoins === undefined) data.spentCoins = 0;
    if(data.userName === undefined) data.userName = "";
    if(!data.tasks) data.tasks = {};
    if(data.lifetime === undefined) data.lifetime = 0;
}

migrateOldData();

function save(){
    localStorage.setItem("cozyDataV2", JSON.stringify(data));
}

function saveName(){
    const name = document.getElementById("nameInput").value.trim();
    data.userName = name;
    save();
    renderName();
}

function renderName(){
    const name = data.userName || "BanannaSmuthi";
    document.getElementById("titleName").innerText = `${name}'s BanannaSmuthi Calendar`;
    document.getElementById("helloName").innerText = `Oiii, ${name}!`;
    document.getElementById("nameInput").value = data.userName || "";
}

function dayHasCompletedTask(key){
    const items = data.tasks[key]?.items || [];
    return items.some(t => t.done);
}

function completedCoinTotalForDay(key){
    const items = data.tasks[key]?.items || [];
    return items
        .filter(t => t.done)
        .reduce((sum, t) => sum + Number(t.coins || 0), 0);
}

function getMonday(date){
    const d = cleanDate(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d;
}

function getSunday(date){
    const monday = getMonday(date);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    return sunday;
}

function getWeeklyCoins(){
    const monday = getMonday(today);
    const sunday = getSunday(today);
    let total = 0;

    Object.keys(data.tasks).forEach(key => {
        const d = parseKey(key);
        if(d >= monday && d <= sunday){
            total += completedCoinTotalForDay(key);
        }
    });

    return total;
}

function dayCountsForStreak(key){
    /*
      A day counts for the streak if the user has completed
      at least one task OR earned any coins that day.
    */
    return dayHasCompletedTask(key) || completedCoinTotalForDay(key) > 0;
}

function getMostRecentCompletedDate(){
    let mostRecent = null;

    Object.keys(data.tasks).forEach(key => {
        if(dayCountsForStreak(key)){
            const d = parseKey(key);

            if(!mostRecent || d > mostRecent){
                mostRecent = d;
            }
        }
    });

    return mostRecent;
}

function getCurrentStreak(){
    /*
      Streak rules:
      - Adds 1 for each consecutive calendar day with at least one completed task / earned coin.
      - Counts backward from the most recent completed day.
      - Resets to 0 if a full day was missed after the most recent completed day.
        Example:
        Completed Monday and Tuesday, but today is Thursday and Wednesday was missed → streak is 0.
      - If today is incomplete but yesterday was completed, the streak still shows.
        Example:
        Completed Monday and Tuesday, today is Wednesday morning → streak is 2.
    */

    const mostRecent = getMostRecentCompletedDate();
    if(!mostRecent) return 0;

    const todayClean = cleanDate(today);
    const yesterday = cleanDate(today);
    yesterday.setDate(yesterday.getDate() - 1);

    // If the most recent completed day is older than yesterday, a day was missed, so reset.
    if(mostRecent < yesterday){
        return 0;
    }

    let streak = 0;
    let cursor = cleanDate(mostRecent);

    while(true){
        const key = dateKey(cursor);

        if(dayCountsForStreak(key)){
            streak++;
            cursor.setDate(cursor.getDate() - 1);
        } else {
            break;
        }
    }

    return streak;
}

function recalculateBalances(){
    let earned = 0;
    Object.keys(data.tasks).forEach(key => {
        earned += completedCoinTotalForDay(key);
    });

    const spent = data.redeemedRewards.reduce((sum, r) => sum + Number(r.cost || 0), 0);

    data.lifetime = earned;
    data.spentCoins = spent;
    data.availableCoins = Math.max(0, earned - spent);
    save();
}

function animateCoin(key){
    requestAnimationFrame(() => {
        const el = document.getElementById(`coin-${key}`);
        if(!el) return;

        el.classList.remove("animate");
        void el.offsetWidth;
        el.classList.add("animate");

        setTimeout(() => {
            el.classList.remove("animate");
        }, 650);
    });
}

function buildCalendar(){
    recalculateBalances();

    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    const weekdays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    weekdays.forEach(day => {
        cal.innerHTML += `<div class="weekday">${day}</div>`;
    });

    let y = today.getFullYear();
    let m = today.getMonth();

    document.getElementById("monthLabel").innerText =
        today.toLocaleString("default", {month:"long"}) + " " + y;

    let first = new Date(y,m,1).getDay();
    let days = new Date(y,m+1,0).getDate();

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=days; d++){
        let key = `${y}-${m}-${d}`;
        let coins = completedCoinTotalForDay(key);
        let todayClass = key === dateKey(today) ? "today" : "";

        cal.innerHTML += `
        <div class="day ${todayClass}" onclick="openDay('${key}',${d})">
            <div class="day-number">${d}</div>
            <small class="coin-glitter" id="coin-${key}">🪙 ${coins}</small>
        </div>`;
    }

    updateCoins();
}

function openDay(key, day){
    selectedDay = key;

    document.getElementById("sidebar").classList.remove("hidden");

    const openedDate = parseKey(key);
    document.getElementById("selectedDay").innerText =
        openedDate.toLocaleDateString("default", {
            weekday:"long",
            month:"long",
            day:"numeric",
            year:"numeric"
        });

    renderTasks();
    renderRewards();
    updateCoins();
}

function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
    selectedDay = null;
}

function addTask(){
    if(!selectedDay) return;

    let name = document.getElementById("taskInput").value.trim();
    let coins = parseInt(document.getElementById("coinInput").value) || 0;

    if(!name){
        alert("Please enter a task name.");
        return;
    }

    if(!data.tasks[selectedDay]){
        data.tasks[selectedDay] = {items:[]};
    }

    data.tasks[selectedDay].items.push({
        name,
        coins,
        done:false
    });

    document.getElementById("taskInput").value = "";
    document.getElementById("coinInput").value = "";

    save();
    renderTasks();
    buildCalendar();
    updateCoins();
}

function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];
    let key = selectedDay;

    t.done = !t.done;

    save();

    renderTasks();
    buildCalendar();
    updateCoins();
    renderRewards();

    if(t.done){
        setTimeout(() => {
            animateCoin(key);
        }, 50);
    }
}

function deleteTask(i){
    if(!selectedDay) return;

    data.tasks[selectedDay].items.splice(i, 1);

    save();
    renderTasks();
    buildCalendar();
    updateCoins();
    renderRewards();
}

function renderTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let day = data.tasks[selectedDay];

    if(!day || day.items.length === 0){
        list.innerHTML = `<p class="empty">No tasks yet for this day.</p>`;
        updateCoins();
        return;
    }

    day.items.forEach((t,i)=>{
        list.innerHTML += `
        <div class="task ${t.done ? "done" : ""}">
            <div class="task-left">
                <span class="task-name">${escapeHTML(t.name)}</span>
                <span> (+${Number(t.coins || 0)})</span>
            </div>
            <input type="checkbox" ${t.done ? "checked" : ""} onchange="toggleTask(${i})" style="width:auto;">
            <button class="danger" onclick="deleteTask(${i})">Delete</button>
        </div>`;
    });

    updateCoins();
}

function addReward(){
    const name = document.getElementById("rewardInput").value.trim();
    const cost = parseInt(document.getElementById("rewardCostInput").value) || 0;

    if(!name){
        alert("Please enter a reward name.");
        return;
    }

    data.rewards.push({
        id: Date.now().toString() + Math.random().toString(16).slice(2),
        name,
        cost
    });

    document.getElementById("rewardInput").value = "";
    document.getElementById("rewardCostInput").value = "";

    save();
    renderRewards();
    updateCoins();
}

function redeemReward(id){
    recalculateBalances();

    const index = data.rewards.findIndex(r => r.id === id);
    if(index === -1) return;

    const reward = data.rewards[index];

    if(data.availableCoins < reward.cost){
        alert("Not enough available points for this reward yet.");
        return;
    }

    data.redeemedRewards.push({
        name: reward.name,
        cost: reward.cost,
        redeemedOn: dateKey(today)
    });

    data.rewards.splice(index, 1);

    save();
    recalculateBalances();
    renderRewards();
    updateCoins();
    buildCalendar();
}

function deleteReward(id){
    const index = data.rewards.findIndex(r => r.id === id);
    if(index === -1) return;

    data.rewards.splice(index, 1);
    save();
    renderRewards();
}

function renderRewards(){
    const list = document.getElementById("rewardList");
    list.innerHTML = "";

    if(data.rewards.length === 0){
        list.innerHTML = `<p class="empty">No rewards yet. Add one above.</p>`;
        return;
    }

    recalculateBalances();

    data.rewards.forEach(r => {
        const canAfford = data.availableCoins >= Number(r.cost || 0);

        list.innerHTML += `
        <div class="reward">
            <div class="reward-left">
                <span>${escapeHTML(r.name)}</span>
                <span class="reward-cost"> — ${Number(r.cost || 0)} points</span>
            </div>
            <button onclick="redeemReward('${r.id}')" ${canAfford ? "" : "disabled"}>Redeem</button>
            <button class="danger" onclick="deleteReward('${r.id}')">Delete</button>
        </div>`;
    });
}

function updateCoins(){
    recalculateBalances();

    document.getElementById("availableCoins").innerText = data.availableCoins;
    document.getElementById("dailyCoins").innerText = selectedDay ? completedCoinTotalForDay(selectedDay) : 0;
    document.getElementById("weeklyCoins").innerText = getWeeklyCoins();
    document.getElementById("lifeCoins").innerText = data.lifetime;
    document.getElementById("streak").innerText = getCurrentStreak();
}

function escapeHTML(str){
    return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

renderName();
buildCalendar();
updateCoins();
</script>

</body>
</html>
