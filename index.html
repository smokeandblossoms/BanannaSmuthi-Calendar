<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
header{
    background:#7c9a6d;
    color:white;
    padding:15px;
    text-align:center;
}

/* TOP BAR */
.top{
    background:#ffffffcc;
    padding:10px;
    display:flex;
    justify-content:space-around;
    font-weight:bold;
    flex-wrap:wrap;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 220px);
}

/* CALENDAR */
.calendar{
    flex:2;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

/* DAY */
.day{
    background: rgba(255,255,255,0.5);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    min-height:70px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* SIDEBAR */
.sidebar{
    flex:1;
    background:#fffdf7cc;
    padding:15px;
    overflow:auto;
}

.sidebar.hidden{ display:none; }

/* TASK */
.task{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    padding:8px;
    border-bottom:1px solid #eee;
}

/* REWARD */
.reward{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
    padding:6px;
    background:white;
    border-radius:6px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.claim-btn{
    background:#ffb347;
}
.claim-btn:disabled{
    background:#ccc;
}
input{
    width:100%;
    margin:5px 0;
    padding:6px;
}
</style>
</head>

<body>

<header>
<h2>🗓 The BanannaSmuthi Calendar</h2>
</header>

<!-- TOP STATS -->
<div class="top">
👤 <span id="user">Guest</span>
🔥 Streak: <span id="streak">0</span>
🪙 Available: <span id="available">0</span>
📅 Weekly: <span id="weekly">0</span>
💰 Usable: <span id="usable">0</span>
</div>

<div class="container">

<!-- CALENDAR -->
<div class="calendar">
<div class="grid" id="calendar"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<h3 id="dayTitle"></h3>

<!-- USER -->
<h4>👤 Name</h4>
<input id="nameInput">
<button onclick="setName()">Set Name</button>

<hr>

<!-- TASKS -->
<input id="taskInput" placeholder="Task">
<input id="coinInput" type="number" placeholder="Coins">
<button onclick="addTask()">Add Task</button>

<div id="tasks"></div>

<hr>

<!-- REWARDS -->
<h3>🎁 Rewards</h3>

<input id="rewardInput" placeholder="Reward">
<input id="rewardCost" type="number" placeholder="Cost">
<button onclick="addReward()">Add Reward</button>

<div id="rewards"></div>

</div>
</div>

<script>

let selectedDay = null;

let data = JSON.parse(localStorage.getItem("data")) || {
    tasks:{},
    rewards:[],
    available:0,
    weekly:0,
    user:"Guest",
    selectedRewards:[]
};

function save(){
    localStorage.setItem("data", JSON.stringify(data));
}

/* USER */
function setName(){
    let n = document.getElementById("nameInput").value;
    if(!n) return;
    data.user = n;
    save();
    updateUI();
}

/* OPEN */
function openDay(d){
    selectedDay = d;
    document.getElementById("sidebar").classList.remove("hidden");
    document.getElementById("dayTitle").innerText = d;
    renderTasks();
}

/* CLOSE */
function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
}

/* TASKS */
function addTask(){
    let n = document.getElementById("taskInput").value;
    let c = parseInt(document.getElementById("coinInput").value)||0;

    if(!data.tasks[selectedDay]) data.tasks[selectedDay]={items:[]};

    data.tasks[selectedDay].items.push({name:n,coins:c,done:false});

    save(); renderTasks(); build(); updateUI();
}

/* TOGGLE TASK */
function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];

    t.done = !t.done;

    if(t.done){
        data.available += t.coins;
        data.weekly += t.coins;
    } else {
        data.available -= t.coins;
        data.weekly -= t.coins;
    }

    save();
    renderTasks();
    build();
    updateUI();
}

/* REWARDS */
function addReward(){
    let n = document.getElementById("rewardInput").value;
    let c = parseInt(document.getElementById("rewardCost").value)||0;

    data.rewards.push({name:n,cost:c,claimed:false});

    save();
    renderRewards();
    updateUI();
}

/* SELECT REWARD */
function toggleReward(i){
    let idx = data.selectedRewards.indexOf(i);

    if(idx === -1) data.selectedRewards.push(i);
    else data.selectedRewards.splice(idx,1);

    updateUI();
}

/* CLAIM */
function claim(i){
    let r = data.rewards[i];

    if(data.available < r.cost){
        alert("Not enough coins");
        return;
    }

    data.available -= r.cost;
    r.claimed = true;

    save();
    renderRewards();
    updateUI();
}

/* CALENDAR */
function build(){
    let c = document.getElementById("calendar");
    c.innerHTML = "";

    for(let i=1;i<=30;i++){

        let k = "day-"+i;

        let coins = data.tasks[k]?.items
            ?.filter(t=>t.done)
            ?.reduce((a,b)=>a+b.coins,0) || 0;

        c.innerHTML += `
        <div class="day" onclick="openDay('${k}')">
            Day ${i}
            🪙 ${coins}
        </div>`;
    }
}

/* TASK RENDER */
function renderTasks(){
    let t = document.getElementById("tasks");
    t.innerHTML = "";

    let d = data.tasks[selectedDay];
    if(!d) return;

    d.items.forEach((x,i)=>{
        t.innerHTML += `
        <div class="task">
            ${x.name} +${x.coins}
            <input type="checkbox" ${x.done?"checked":""}
            onchange="toggleTask(${i})">
        </div>`;
    });
}

/* REWARD RENDER */
function renderRewards(){
    let r = document.getElementById("rewards");
    r.innerHTML = "";

    data.rewards.forEach((x,i)=>{

        let selected = data.selectedRewards.includes(i);

        r.innerHTML += `
        <div class="reward">
            <input type="checkbox" onchange="toggleReward(${i})" ${selected?"checked":""}>
            ${x.name} - ${x.cost}
            <button onclick="claim(${i})" ${x.claimed?"disabled":""}>
                ${x.claimed?"Claimed":"Claim"}
            </button>
        </div>`;
    });
}

/* STREAK */
function streak(){
    let s = 0;
    for(let i=1;i<=30;i++){
        let k = "day-"+i;
        if(data.tasks[k]?.items?.some(t=>t.done)) s++;
        else break;
    }
    return s;
}

/* UPDATE UI */
function updateUI(){

    document.getElementById("user").innerText = data.user;
    document.getElementById("available").innerText = data.available;
    document.getElementById("weekly").innerText = data.weekly;
    document.getElementById("streak").innerText = streak();

    let reserved = 0;

    data.selectedRewards.forEach(i=>{
        if(data.rewards[i] && !data.rewards[i].claimed){
            reserved += data.rewards[i].cost;
        }
    });

    document.getElementById("usable").innerText =
        data.available - reserved;
}

/* INIT */
build();
updateUI();

</script>

</body>
</html>
