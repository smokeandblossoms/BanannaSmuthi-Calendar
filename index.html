<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 200px);
}

/* CALENDAR */
.calendar{
    flex:2;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    background: rgba(255,255,255,0.5);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    min-height:60px;
}

/* SIDEBAR */
.sidebar{
    flex:1;
    background:#fffdf7cc;
    padding:15px;
    overflow:auto;
}

.sidebar.hidden{
    display:none;
}

/* TASK */
.task{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    padding:8px;
    border-bottom:1px solid #eee;
}

/* BUTTONS */
button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* CLAIM BUTTON */
.claim-btn{
    background:#ffb347;
}
.claim-btn:disabled{
    background:#ccc;
    cursor:not-allowed;
}

/* BOX */
.coins{
    background:#fff3c4cc;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- CALENDAR -->
<div class="calendar">
    <div class="grid" id="calendar"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<div class="coins">
🪙 Available Points: <span id="available">0</span><br>
🪙 Lifetime Earned: <span id="lifetime">0</span><br>
</div>

<h3 id="selectedDay"></h3>

<!-- TASKS -->
<input id="taskInput" placeholder="New task">
<input id="coinInput" type="number" placeholder="Points">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

<hr>

<!-- 🎁 REWARD CREATION (RESTORED) -->
<h3>🎁 Rewards</h3>

<input id="rewardName" placeholder="Reward name">
<input id="rewardCost" type="number" placeholder="Cost">
<button onclick="addReward()">Add Reward</button>

<div id="rewardList"></div>

<!-- AVAILABLE POINTS DISPLAY -->
<h4>🪙 Points available for rewards:</h4>
<div id="rewardPoints">0</div>

</div>
</div>

<script>

let selectedDay = null;

let data = JSON.parse(localStorage.getItem("cozyData")) || {
    tasks:{},
    rewards:[],
    available:0,
    lifetime:0
};

function save(){
    localStorage.setItem("cozyData", JSON.stringify(data));
}

/* OPEN DAY */
function openDay(key){
    selectedDay = key;
    document.getElementById("sidebar").classList.remove("hidden");
    renderTasks();
}

/* CLOSE */
function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
}

/* ADD TASK */
function addTask(){
    if(!selectedDay) return;

    let name = document.getElementById("taskInput").value;
    let coins = parseInt(document.getElementById("coinInput").value)||0;

    if(!data.tasks[selectedDay]){
        data.tasks[selectedDay]={items:[]};
    }

    data.tasks[selectedDay].items.push({
        name,
        coins,
        done:false
    });

    save();
    renderTasks();
    updateUI();
}

/* TOGGLE TASK */
function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];

    t.done = !t.done;

    if(t.done){
        data.available += t.coins;
        data.lifetime += t.coins;
    } else {
        data.available -= t.coins;
    }

    save();
    renderTasks();
    updateUI();
}

/* DELETE TASK */
function deleteTask(i){
    let t = data.tasks[selectedDay].items[i];

    if(t.done){
        data.available -= t.coins;
        data.lifetime -= t.coins;
    }

    data.tasks[selectedDay].items.splice(i,1);

    save();
    renderTasks();
    updateUI();
}

/* 🎁 ADD REWARD (FIXED + RESTORED) */
function addReward(){
    let name = document.getElementById("rewardName").value;
    let cost = parseInt(document.getElementById("rewardCost").value)||0;

    if(!name || cost <= 0) return;

    data.rewards.push({
        name,
        cost,
        claimed:false
    });

    save();
    renderRewards();
    updateUI();

    document.getElementById("rewardName").value = "";
    document.getElementById("rewardCost").value = "";
}

/* CLAIM REWARD */
function claimReward(i){
    let r = data.rewards[i];

    if(data.available < r.cost){
        alert("Not enough points!");
        return;
    }

    data.available -= r.cost;
    r.claimed = true;

    save();
    renderRewards();
    updateUI();
}

/* RENDER TASKS */
function renderTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let day = data.tasks[selectedDay];
    if(!day) return;

    day.items.forEach((t,i)=>{
        list.innerHTML += `
        <div class="task">
            <span>${t.name} (+${t.coins})</span>
            <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
        </div>`;
    });
}

/* RENDER REWARDS */
function renderRewards(){
    let list = document.getElementById("rewardList");
    list.innerHTML = "";

    data.rewards.forEach((r,i)=>{
        list.innerHTML += `
        <div class="task">
            <span>${r.name} - 🪙${r.cost}</span>
            <button class="claim-btn"
                onclick="claimReward(${i})"
                ${r.claimed ? "disabled" : ""}>
                ${r.claimed ? "Claimed" : "Claim"}
            </button>
        </div>`;
    });
}

/* UPDATE UI */
function updateUI(){
    document.getElementById("available").innerText = data.available;
    document.getElementById("lifetime").innerText = data.lifetime;
    document.getElementById("rewardPoints").innerText = data.available;
}

/* CALENDAR */
function buildCalendar(){
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let d=1; d<=30; d++){
        let key = "day-"+d;

        cal.innerHTML += `
        <div class="day" onclick="openDay('${key}')">
            Day ${d}
        </div>`;
    }
}

/* INIT */
buildCalendar();
updateUI();

</script>

</body>
</html>
