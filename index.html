<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;

    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color:#2f2f2f;
}

/* HEADER */
header{
    background:#7c9a6d;
    color:white;
    padding:15px;
    text-align:center;
}

/* MONTH TITLE */
#monthLabel{
    font-size:32px;
    color:white;
    text-align:center;
    font-weight:bold;
    margin:10px 0;
    text-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 200px);
    justify-content:center;
}

/* CALENDAR */
.calendar{
    flex:2;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

/* DAY TABS */
.day{
    background: rgba(255,255,255,0.5);
    border-radius:10px;
    padding:10px;
    min-height:60px;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    font-size:14px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(8px);
}

.day:hover{
    background: rgba(255,255,255,0.6);
}

/* ⭐ COIN GLITTER ANIMATION (FIXED) */
@keyframes coinGlowBurst {
    0% {
        transform: scale(1);
        text-shadow: 0 0 0 rgba(255,215,0,0);
    }
    40% {
        transform: scale(1.4);
        text-shadow:
            0 0 6px gold,
            0 0 12px white,
            0 0 18px gold;
    }
    100% {
        transform: scale(1);
        text-shadow: 0 0 0 rgba(255,215,0,0);
    }
}

.coin-glitter {
    display: inline-block;
}

.coin-glitter.animate {
    animation: coinGlowBurst 600ms ease-out;
}

/* SIDEBAR */
.sidebar{
    flex:1;
    background:#fffdf7cc;
    border-left:2px solid #e6dfd2;
    padding:15px;
    overflow:auto;
}

.sidebar.hidden{
    display:none;
}

/* TASKS */
.task{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    padding:8px;
    border-bottom:1px solid #eee;
    align-items:center;
}

.task.done span{
    text-decoration:line-through;
    color:green;
}

/* BUTTONS */
button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-top:5px;
}

input{
    width:100%;
    padding:6px;
    margin:5px 0;
}

/* COINS BOX */
.coins{
    background:#fff3c4cc;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>The BanannaSmuthi Calendar</h2>
</header>

<h3 id="monthLabel"></h3>

<div class="container">

<div class="calendar">
    <div class="grid" id="calendar"></div>
</div>

<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<div class="coins">
🪙 Weekly Coins: <span id="coins">0</span><br>
🪙 Lifetime: <span id="lifeCoins">0</span><br>
🔥 Streak: <span id="streak">0</span>
</div>

<h3 id="selectedDay"></h3>

<input id="taskInput" placeholder="New task...">
<input id="coinInput" type="number" placeholder="Coin value">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

</div>
</div>

<script>

let today = new Date();
let selectedDay = null;

let data = JSON.parse(localStorage.getItem("cozyData")) || {
    tasks:{},
    coins:0,
    lifetime:0
};

function save(){
    localStorage.setItem("cozyData", JSON.stringify(data));
}

/* ⭐ COIN ANIMATION (FIXED TIMING) */
function animateCoin(key){
    requestAnimationFrame(() => {
        const el = document.getElementById(`coin-${key}`);
        if(!el) return;

        el.classList.remove("animate");
        void el.offsetWidth;
        el.classList.add("animate");

        setTimeout(() => {
            el.classList.remove("animate");
        }, 650);
    });
}

/* CALENDAR */
function buildCalendar(){
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let y = today.getFullYear();
    let m = today.getMonth();

    document.getElementById("monthLabel").innerText =
        today.toLocaleString('default',{month:'long'}) + " " + y;

    let first = new Date(y,m,1).getDay();
    let days = new Date(y,m+1,0).getDate();

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=days; d++){
        let key = `${y}-${m}-${d}`;

        let dayTasks = data.tasks[key]?.items || [];
        let coins = dayTasks.filter(t=>t.done).reduce((a,b)=>a+b.coins,0);

        cal.innerHTML += `
        <div class="day" onclick="openDay('${key}',${d})">
            ${d}
            <small class="coin-glitter" id="coin-${key}">🪙 ${coins}</small>
        </div>`;
    }
}

/* OPEN DAY */
function openDay(key, day){
    selectedDay = key;

    document.getElementById("sidebar").classList.remove("hidden");
    document.getElementById("selectedDay").innerText = "Day " + day;

    renderTasks();
}

function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
    selectedDay = null;
}

/* TASKS */
function addTask(){
    if(!selectedDay) return;

    let name = document.getElementById("taskInput").value;
    let coins = parseInt(document.getElementById("coinInput").value) || 0;

    if(!data.tasks[selectedDay]){
        data.tasks[selectedDay] = {items:[]};
    }

    data.tasks[selectedDay].items.push({
        name,
        coins,
        done:false
    });

    save();
    renderTasks();
    buildCalendar();
    updateCoins();
}

/* ⭐ FIXED TOGGLE (IMPORTANT) */
function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];
    let key = selectedDay;

    t.done = !t.done;

    if(t.done){
        data.coins += t.coins;
        data.lifetime += t.coins;
    } else {
        data.coins -= t.coins;
        data.lifetime -= t.coins;
    }

    save();

    renderTasks();
    buildCalendar();
    updateCoins();

    if(t.done){
        setTimeout(() => {
            animateCoin(key);
        }, 50);
    }
}

/* RENDER TASKS */
function renderTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let day = data.tasks[selectedDay];
    if(!day) return;

    day.items.forEach((t,i)=>{
        list.innerHTML += `
        <div>
            <span>${t.name} (+${t.coins})</span>
            <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})">
        </div>`;
    });

    updateCoins();
}

/* COINS */
function updateCoins(){
    document.getElementById("coins").innerText = data.coins;
    document.getElementById("lifeCoins").innerText = data.lifetime;
}

/* INIT */
buildCalendar();
updateCoins();

</script>

</body>
</html>
