<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
header{
    background:#7c9a6d;
    color:white;
    padding:15px;
    text-align:center;
}

/* STREAK ONLY UNDER TITLE */
#streakBox{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:white;
    margin-bottom:10px;
    text-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* MONTH */
#monthLabel{
    font-size:28px;
    text-align:center;
    color:white;
    font-weight:bold;
    margin:10px 0;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 200px);
}

/* CALENDAR */
.calendar{
    flex:2;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

/* DAY */
.day{
    background: rgba(255,255,255,0.5);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    min-height:60px;
}

/* COIN */
.coin-glitter{
    display:inline-block;
}
.coin-glitter.animate{
    animation: coinGlowBurst 600ms ease-out;
}

@keyframes coinGlowBurst{
    0%{transform:scale(1);}
    40%{transform:scale(1.4); text-shadow:0 0 10px gold;}
    100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
    flex:1;
    background:#fffdf7cc;
    padding:15px;
    overflow:auto;
}
.sidebar.hidden{display:none;}

/* TASK */
.task{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
}

/* REWARD */
.reward{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
    padding:6px;
    background:white;
    border-radius:6px;
}

/* INPUT */
input{
    width:100%;
    padding:6px;
    margin:5px 0;
}

/* BUTTON */
button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>The BanannaSmuthi Calendar</h2>
</header>

<!-- 🔥 ONLY STREAK SHOWN HERE -->
<div id="streakBox">
🔥 Streak: <span id="streak">0</span>
</div>

<h3 id="monthLabel"></h3>

<div class="container">

<!-- CALENDAR -->
<div class="calendar">
    <div class="grid" id="calendar"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<h3 id="selectedDay"></h3>

<!-- 👤 USER -->
<h4>👤 Name</h4>
<input id="nameInput" placeholder="Enter name">
<button onclick="setName()">Set Name</button>

<hr>

<!-- TASKS -->
<input id="taskInput" placeholder="New task...">
<input id="coinInput" type="number" placeholder="Coin value">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

<hr>

<!-- REWARDS -->
<h3>🎁 Rewards</h3>
<div id="rewardList"></div>

</div>
</div>

<script>

let today = new Date();
let selectedDay = null;

let data = JSON.parse(localStorage.getItem("cozyData")) || {
    tasks:{},
    coins:0,
    lifetime:0,
    user:"Guest",
    rewards:[],
    selectedRewards:[]
};

function save(){
    localStorage.setItem("cozyData", JSON.stringify(data));
}

/* 👤 USER */
function setName(){
    let n = document.getElementById("nameInput").value;
    if(!n) return;
    data.user = n;
    save();
}

/* CALENDAR */
function buildCalendar(){
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let y = today.getFullYear();
    let m = today.getMonth();

    document.getElementById("monthLabel").innerText =
        today.toLocaleString('default',{month:'long'}) + " " + y;

    let first = new Date(y,m,1).getDay();
    let days = new Date(y,m+1,0).getDate();

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=days; d++){
        let key = `${y}-${m}-${d}`;

        let coins = data.tasks[key]?.items
            ?.filter(t=>t.done)
            ?.reduce((a,b)=>a+b.coins,0) || 0;

        cal.innerHTML += `
        <div class="day" onclick="openDay('${key}',${d})">
            ${d}
            <small class="coin-glitter" id="coin-${key}">🪙 ${coins}</small>
        </div>`;
    }
}

/* OPEN DAY */
function openDay(key, day){
    selectedDay = key;
    document.getElementById("sidebar").classList.remove("hidden");
    document.getElementById("selectedDay").innerText = "Day " + day;

    renderTasks();
    renderRewards();
}

/* CLOSE */
function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
}

/* TASKS */
function addTask(){
    let name = document.getElementById("taskInput").value;
    let coins = parseInt(document.getElementById("coinInput").value)||0;

    if(!data.tasks[selectedDay]){
        data.tasks[selectedDay]={items:[]};
    }

    data.tasks[selectedDay].items.push({
        name,
        coins,
        done:false
    });

    save();
    renderTasks();
    buildCalendar();
}

/* TOGGLE TASK */
function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];
    t.done = !t.done;

    if(t.done){
        data.coins += t.coins;
        data.lifetime += t.coins;
    } else {
        data.coins -= t.coins;
        data.lifetime -= t.coins;
    }

    save();
    renderTasks();
    buildCalendar();
    updateStreak();

    animateCoin(selectedDay);
}

/* ANIMATION */
function animateCoin(key){
    const el = document.getElementById(`coin-${key}`);
    if(!el) return;

    el.classList.remove("animate");
    void el.offsetWidth;
    el.classList.add("animate");

    setTimeout(()=>el.classList.remove("animate"),600);
}

/* TASK RENDER */
function renderTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let day = data.tasks[selectedDay];
    if(!day) return;

    day.items.forEach((t,i)=>{
        list.innerHTML += `
        <div class="task">
            ${t.name} (+${t.coins})
            <input type="checkbox" ${t.done?"checked":""}
            onchange="toggleTask(${i})">
        </div>`;
    });
}

/* 🔥 STREAK LOGIC (RESET IF ANY DAY MISSED) */
function getStreak(){
    let y = today.getFullYear();
    let m = today.getMonth();

    let days = new Date(y,m+1,0).getDate();

    let streak = 0;

    for(let d=1; d<=days; d++){
        let key = `${y}-${m}-${d}`;

        let done = data.tasks[key]?.items?.some(t=>t.done);

        if(done){
            streak++;
        } else {
            streak = 0; // RESET ON GAP
        }
    }

    return streak;
}

function updateStreak(){
    document.getElementById("streak").innerText = getStreak();
}

/* REWARDS */
function toggleReward(i){
    let idx = data.selectedRewards.indexOf(i);

    if(idx === -1) data.selectedRewards.push(i);
    else data.selectedRewards.splice(idx,1);
}

/* REWARD RENDER */
function renderRewards(){
    let r = document.getElementById("rewardList");
    r.innerHTML = "";

    data.rewards.forEach((x,i)=>{

        let checked = data.selectedRewards.includes(i);

        r.innerHTML += `
        <div class="reward">
            <label>
                <input type="checkbox"
                onchange="toggleReward(${i})"
                ${checked?"checked":""}>
                ${x.name} - ${x.cost}
            </label>
        </div>`;
    });
}

/* INIT */
buildCalendar();
updateStreak();

</script>

</body>
</html>
