<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The BanannaSmuthi Calendar</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url("https://i.pinimg.com/736x/3f/4a/94/3f4a9446596e53d3d82814bf6c042e0d.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
header{
    background:#7c9a6d;
    color:white;
    padding:15px;
    text-align:center;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 200px);
}

/* CALENDAR */
.calendar{
    flex:2;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

/* DAY TILE */
.day{
    background: rgba(255,255,255,0.55);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    min-height:70px;
    position:relative;
}

/* 🪙 COIN DISPLAY */
.coin{
    display:block;
    font-size:12px;
    margin-top:5px;
    transition: transform 0.3s ease;
}

/* ✨ ANIMATION */
@keyframes coinGlow {
    0% { transform: scale(1); filter: brightness(1); }
    40% { transform: scale(1.4); filter: brightness(1.8); }
    100% { transform: scale(1); filter: brightness(1); }
}

.coin.animate{
    animation: coinGlow 0.6s ease;
}

/* SIDEBAR */
.sidebar{
    flex:1;
    background:#fffdf7cc;
    padding:15px;
    overflow:auto;
}

.sidebar.hidden{
    display:none;
}

/* TASK */
.task{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    padding:8px;
    border-bottom:1px solid #eee;
}

/* BUTTONS */
button{
    background:#7c9a6d;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* REWARD BUTTON */
.claim-btn{
    background:#ffb347;
}
.claim-btn:disabled{
    background:#ccc;
}
</style>
</head>

<body>

<header>
<h2>🗓 The BanannaSmuthi Calendar</h2>
</header>

<div class="container">

<!-- CALENDAR -->
<div class="calendar">
    <div class="grid" id="calendar"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">

<button onclick="closeSidebar()">← Close</button>

<div>
🪙 Available: <span id="available">0</span><br>
🪙 Lifetime: <span id="lifetime">0</span>
</div>

<h3 id="selectedDay"></h3>

<input id="taskInput" placeholder="New task">
<input id="coinInput" type="number" placeholder="Coins">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

<hr>

<h3>🎁 Rewards</h3>

<input id="rewardName" placeholder="Reward name">
<input id="rewardCost" type="number" placeholder="Cost">
<button onclick="addReward()">Add Reward</button>

<div id="rewardList"></div>

<h4>🪙 Available for Rewards:</h4>
<div id="rewardPoints">0</div>

</div>
</div>

<script>

let selectedDay = null;

let data = JSON.parse(localStorage.getItem("cozyData")) || {
    tasks:{},
    rewards:[],
    available:0,
    lifetime:0
};

function save(){
    localStorage.setItem("cozyData", JSON.stringify(data));
}

/* OPEN DAY */
function openDay(key){
    selectedDay = key;
    document.getElementById("sidebar").classList.remove("hidden");
    document.getElementById("selectedDay").innerText = key;
    renderTasks();
}

/* CLOSE */
function closeSidebar(){
    document.getElementById("sidebar").classList.add("hidden");
}

/* ADD TASK */
function addTask(){
    if(!selectedDay) return;

    let name = document.getElementById("taskInput").value;
    let coins = parseInt(document.getElementById("coinInput").value)||0;

    if(!data.tasks[selectedDay]){
        data.tasks[selectedDay]={items:[]};
    }

    data.tasks[selectedDay].items.push({
        name,
        coins,
        done:false
    });

    save();
    renderTasks();
    buildCalendar();
    updateUI();

    document.getElementById("taskInput").value="";
    document.getElementById("coinInput").value="";
}

/* TOGGLE TASK + ANIMATION FIX */
function toggleTask(i){
    let t = data.tasks[selectedDay].items[i];

    t.done = !t.done;

    if(t.done){
        data.available += t.coins;
        data.lifetime += t.coins;
    } else {
        data.available -= t.coins;
    }

    save();
    renderTasks();
    buildCalendar();
    updateUI();

    if(t.done){
        triggerCoinAnimation(selectedDay);
    }
}

/* ✨ SAFE COIN ANIMATION (FIXED FOR REBUILT DOM) */
function triggerCoinAnimation(dayKey){
    requestAnimationFrame(() => {
        const el = document.querySelector(`[data-key="${dayKey}"]`);
        if(!el) return;

        const coin = el.querySelector(".coin");
        if(!coin) return;

        coin.classList.remove("animate");
        void coin.offsetWidth;
        coin.classList.add("animate");

        setTimeout(()=>coin.classList.remove("animate"),600);
    });
}

/* RENDER TASKS */
function renderTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let day = data.tasks[selectedDay];
    if(!day) return;

    day.items.forEach((t,i)=>{
        list.innerHTML += `
        <div class="task">
            <span>${t.name} (+${t.coins})</span>
            <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
        </div>`;
    });
}

/* REWARDS */
function addReward(){
    let name = document.getElementById("rewardName").value;
    let cost = parseInt(document.getElementById("rewardCost").value)||0;

    data.rewards.push({name,cost,claimed:false});

    save();
    renderRewards();
    updateUI();
}

function claimReward(i){
    let r = data.rewards[i];

    if(data.available < r.cost){
        alert("Not enough points!");
        return;
    }

    data.available -= r.cost;
    r.claimed = true;

    save();
    renderRewards();
    updateUI();
}

/* RENDER REWARDS */
function renderRewards(){
    let list = document.getElementById("rewardList");
    list.innerHTML = "";

    data.rewards.forEach((r,i)=>{
        list.innerHTML += `
        <div class="task">
            <span>${r.name} - 🪙${r.cost}</span>
            <button class="claim-btn"
                onclick="claimReward(${i})"
                ${r.claimed?"disabled":""}>
                ${r.claimed?"Claimed":"Claim"}
            </button>
        </div>`;
    });
}

/* UI */
function updateUI(){
    document.getElementById("available").innerText = data.available;
    document.getElementById("lifetime").innerText = data.lifetime;
    document.getElementById("rewardPoints").innerText = data.available;
}

/* CALENDAR (FIXED STABLE COIN + DATA ATTRIBUTE) */
function buildCalendar(){
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let d=1; d<=30; d++){
        let key = "day-"+d;

        let coins = data.tasks[key]?.items
            ?.filter(t=>t.done)
            ?.reduce((a,b)=>a+b.coins,0) || 0;

        cal.innerHTML += `
        <div class="day" data-key="${key}" onclick="openDay('${key}')">
            Day ${d}
            <span class="coin">🪙 ${coins}</span>
        </div>`;
    }
}

/* INIT */
buildCalendar();
updateUI();

</script>

</body>
</html>
